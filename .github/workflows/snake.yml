name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#3B82F6&color_dots[0]=#1a1b27&color_dots[1]=#1e3a5f&color_dots[2]=#F59E0B&color_dots[3]=#3B82F6&color_dots[4]=#ffffff
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#3B82F6&color_dots[0]=#1a1b27&color_dots[1]=#1e3a5f&color_dots[2]=#F59E0B&color_dots[3]=#3B82F6&color_dots[4]=#ffffff

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
